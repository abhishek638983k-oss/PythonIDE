<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Web Compiler Pro+</title>

    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

    <!-- Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

    <!-- Top Bar -->
    <div id="topbar">
        <span>🐍 Python Web Compiler Pro+</span>

        <div id="topbar-actions">
            <button onclick="toggleTheme()">🌙 Theme</button>
            <button onclick="clearTerminal()">🧹 Clear</button>
        </div>
    </div>

    <!-- Controls -->
    <div id="controls">

        <button onclick="runCode()">▶ Run</button>

        <button onclick="saveCode()">💾 Save</button>

        <button onclick="undo()">↶ Undo</button>

        <button onclick="redo()">↷ Redo</button>

        <button onclick="formatCode()">✨ Format</button>

        <button onclick="newTab()">➕ New Tab</button>

        <button onclick="downloadFile()">⬇ Download</button>

        <button onclick="uploadFile()">📂 Open File</button>

        <button onclick="shareCode()">🔗 Share</button>

        <button onclick="installPackage()">📦 Install Package</button>

        <input
            type="file"
            id="fileInput"
            hidden
        >
    </div>

    <!-- Tabs -->
    <div id="tabs"></div>

    <!-- Main Workspace -->
    <div id="workspace">

        <!-- Sidebar -->
        <aside id="sidebar">

            <div class="sidebar-title">
                📁 Files
            </div>

            <div id="fileExplorer">
                <!-- JS Generates -->
            </div>

        </aside>

        <!-- Main Container -->
        <div id="container">

            <!-- Editor -->
            <div id="editor"></div>

            <!-- Splitter -->
            <div id="splitter"></div>

            <!-- Terminal -->
            <div id="terminalPanel">

                <div id="terminalHeader">
                    <span>Terminal</span>

                    <button
                        onclick="clearTerminal()"
                    >
                        Clear
                    </button>
                </div>

                <div id="terminal"></div>

            </div>

        </div>

    </div>

    <!-- Input Modal -->
    <div id="inputModal" class="hidden">

        <div id="inputBox">

            <h3>Python input()</h3>

            <input
                type="text"
                id="pythonInput"
                placeholder="Enter value..."
            >

            <div class="modal-buttons">

                <button
                    onclick="submitInput()"
                >
                    Submit
                </button>

            </div>

        </div>

    </div>

    <!-- Package Modal -->
    <div id="packageModal" class="hidden">

        <div id="packageBox">

            <h3>Install Python Package</h3>

            <input
                type="text"
                id="packageName"
                placeholder="requests"
            >

            <div class="modal-buttons">

                <button
                    onclick="confirmInstallPackage()"
                >
                    Install
                </button>

                <button
                    onclick="closePackageModal()"
                >
                    Cancel
                </button>

            </div>

        </div>

    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="hidden">
        Loading Python Runtime...
    </div>

    <!-- Status Bar -->
    <div id="statusbar">

        <span id="status">
            Ready
        </span>

        <span id="autosaveStatus">
            Auto-save: ON
        </span>

    </div>

    <!-- Script -->
    <script src="script.js" defer></script>

</body>
</html>
